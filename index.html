<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--card:#fff;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
header{padding:18px 22px;background:#fff;border-bottom:1px solid var(--line)}
header h1{margin:0 0 4px;font-size:20px;font-weight:700}

.phasebar{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;font-size:12.5px}

.dot{width:18px;height:4px;border-radius:2px;display:inline-block}
.wrap{display:flex;height:calc(100vh - 96px);min-height:520px}
#map{flex:1 1 60%;height:100%}
.side{flex:1 1 40%;max-width:520px;overflow-y:auto;background:var(--bg);padding:14px 16px}
.controls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 10px;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px}
.chip .sw{width:10px;height:10px;border-radius:50%}
.chip.off{opacity:.38}
.phase-h{position:sticky;top:0;background:var(--bg);padding:8px 2px 6px;font-size:13px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:#334155;border-bottom:2px solid var(--line);z-index:2;margin-top:6px}
.phase-h .tag{font-weight:600;text-transform:none;letter-spacing:0;font-size:11.5px;color:#fff;border-radius:999px;padding:2px 8px;margin-left:6px}
.card{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:10px 12px;margin:9px 0;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 14px rgba(15,23,42,.09)}
.card .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.card .date{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.card .drive{font-size:11.5px;color:#fff;background:#475569;border-radius:999px;padding:2px 8px;white-space:nowrap}
.card .drive.local{background:#94a3b8}
.card h3{margin:5px 0 7px;font-size:15px}
.card ul{margin:0;padding:0;list-style:none}
.card li{font-size:13px;color:#334155;padding:3px 0 3px 18px;position:relative;line-height:1.35}
.card li:before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--c,#94a3b8)}
.card li .paw{color:#a16207}
.card li .note{color:var(--muted);font-style:italic}
.legend{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}
.leaflet-popup-content{font-size:13px;line-height:1.4}
.leaflet-popup-content b.cv{color:#b45309}
.tabs{display:flex;gap:6px;margin-bottom:10px}
#overblad{font-size:13.5px;color:#334155;line-height:1.55}
#overblad h3{font-size:15px;color:#0f172a;margin:16px 0 6px}
#overblad p{margin:0 0 9px}
#overblad .lead{font-size:14px;color:#0f172a;background:#fff;border:1px solid var(--line);border-left:4px solid #15803d;border-radius:10px;padding:11px 13px;margin-bottom:12px}
.tab{flex:1;font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px;cursor:pointer;color:#475569}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.card p.why{margin:0;font-size:13px;color:#334155;line-height:1.4}
.card p.cv{margin:6px 0 0;font-size:12.5px;color:#b45309}
.card a{font-size:12.5px}
.card .paw{color:#a16207}
@media(max-width:820px){.wrap{flex-direction:column;height:auto}#map{height:52vh;flex:none;width:100%}.side{max-width:none;height:auto;flex:none}}

const MARKERS=[{"id": 1, "naam": "Doetinchem — vertrek", "type": "stop", "lat": 51.965, "lng": 6.288, "dag": "do 6 aug", "fase": "Met de kinderen", "hond": true, "info": "Startpunt. Vertrek 's ochtends.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Doetinchem%20%E2%80%94%20vertrek"}, {"id": 2, "naam": "Châlons-en-Champagne", "type": "overnachting", "lat": 48.957, "lng": 4.365, "dag": "do 6 – vr 7 aug", "fase": "Met de kinderen", "hond": true, "info": "Aankomst donderdag, 2 nachten in de Champagne. Etappe 1 is 535 km — de enige dag net boven 500, dus vroeg starten met een lunchpauze. Vrijdag de champagnestreek in (Épernay, Reims, wijngaarden). Kathedraal en grachtjes in Châlons zelf.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Ch%C3%A2lons-en-Champagne"}, {"id": 3, "naam": "Sancerre", "type": "overnachting", "lat": 47.331, "lng": 2.846, "dag": "za 8 aug", "fase": "Met de kinderen", "hond": true, "info": "Zaterdag de volgende etappe: wijndorp op een heuvel boven de Loire. Terras met een glas Sancerre, Max mag mee.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Sancerre"}, {"id": 4, "naam": "Coulon — Marais Poitevin", "type": "overnachting", "lat": 46.323, "lng": -0.588, "dag": "zo 9 aug", "fase": "Met de kinderen", "hond": true, "info": "Laatste tussenstop vóór de kust (1 nacht). 'Groene Venetië': platbodem-tochtje en fietsen door het moeras.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Coulon%20%E2%80%94%20Marais%20Poitevin"}, {"id": 5, "naam": "Marais Poitevin — fietsen", "type": "fietsen", "lat": 46.3, "lng": -0.68, "dag": "zo 9 aug", "fase": "Met de kinderen", "hond": true, "info": "Vlakke fietsroutes langs de kanalen, prima voor de e-bikes en met Max.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Marais%20Poitevin%20%E2%80%94%20fietsen"}, {"id": 6, "naam": "Camping 2 Plages & Océan", "type": "overnachting", "lat": 46.09, "lng": -1.082, "dag": "ma 10 – zo 16 aug", "fase": "Met de kinderen", "hond": true, "info": "ANKER — vaste boeking, 7 nachten. 122 av. d'Angoulins, Châtelaillon-Plage. Strand op loopafstand.", "link": "https://www.2plages-ocean.com/", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Camping%202%20Plages%20%26%20Oc%C3%A9an"}, {"id": 7, "naam": "Châtelaillon-Plage — strand", "type": "water", "lat": 46.075, "lng": -1.085, "dag": "10–16 aug", "fase": "Met de kinderen", "hond": true, "info": "Breed strand. Honden overdag in de zomer verboden — Max vroeg/laat uitlaten.", "link": "", "caveat": "Hond: alleen vroeg/laat op het strand", "maps": "https://www.google.com/maps/search/?api=1&query=Ch%C3%A2telaillon-Plage%20%E2%80%94%20strand"}, {"id": 8, "naam": "La Rochelle", "type": "historie", "lat": 46.159, "lng": -1.152, "dag": "10–16 aug", "fase": "Met de kinderen", "hond": true, "info": "Oude haven met de torens, levendig centrum. ~20 min rijden, hondvriendelijke kades.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=La%20Rochelle"}, {"id": 9, "naam": "Île de Ré — fietsen", "type": "fietsen", "lat": 46.2, "lng": -1.37, "dag": "10–16 aug", "fase": "Met de kinderen", "hond": true, "info": "Fietseiland met witte dorpjes en zoutpannen. Dagtrip op de e-bikes.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=%C3%8Ele%20de%20R%C3%A9%20%E2%80%94%20fietsen"}, {"id": 10, "naam": "San Sebastián / Donostia", "type": "overnachting", "lat": 43.318, "lng": -1.981, "dag": "ma 17 – di 18 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Transit 409 km / 4u20; 2 nachten — CULINAIR zwaartepunt. Pintxos-bars in de Parte Vieja (La Cuchara, Ganbara, Casa Vallés/Gilda), Mercado de la Bretxa, Monte Igueldo, Peine del Viento en kustdagtrips (Getaria, Hondarribia, panoramaweg Jaizkibel). Área Autocaravanas Berio (~€11, water) of gratis Illunbe.", "link": "https://sansebastianturismoa.eus/en/come/where-to-park/motorhomes-parking-areas/", "caveat": "Stadsstranden zomer: Max alleen vroeg/laat", "maps": "https://www.google.com/maps/search/?api=1&query=San%20Sebasti%C3%A1n%20/%20Donostia"}, {"id": 11, "naam": "Bilbao — tussenstop", "type": "stop", "lat": 43.263, "lng": -2.935, "dag": "wo 19 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Stevige stop onderweg naar de Picos (geen overnachting meer): Casco Viejo, Mercado de la Ribera, pintxos op Plaza Nueva, Guggenheim van buiten (Puppy), en de Funicular de Artxanda voor het uitzicht. Hondvriendelijke terrassen.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Bilbao%20%E2%80%94%20tussenstop"}, {"id": 12, "naam": "San Vicente de la Barquera", "type": "stop", "lat": 43.395, "lng": -4.398, "dag": "wo 19 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Lunchstop onderweg naar de Picos. Cantabrisch vissersstadje, kasteel, zicht op de bergen.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=San%20Vicente%20de%20la%20Barquera"}, {"id": 13, "naam": "Cangas de Onís", "type": "overnachting", "lat": 43.351, "lng": -5.13, "dag": "wo 19 – do 20 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Transit 226 km / 2u40. Poort tot het westelijke massief. Romeinse brug over de Sella; goede uitvalsbasis voor Covadonga.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Cangas%20de%20On%C3%ADs"}, {"id": 14, "naam": "Covadonga — heiligdom", "type": "historie", "lat": 43.308, "lng": -5.056, "dag": "19–20 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Basiliek en de Santa Cueva in een groene bergketel.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Covadonga%20%E2%80%94%20heiligdom"}, {"id": 15, "naam": "Lagos de Covadonga", "type": "water", "lat": 43.273, "lng": -4.992, "dag": "do 20 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Bergmeren Enol & Ercina. In de zomer ALLEEN met de verplichte shuttle (camper >5 m mag de berg niet op). Max mag mee in het bagageruim, aangelijnd.", "link": "https://www.turismoasturias.es/en/organiza-tu-viaje/como-llegar/acceso-a-lagos", "caveat": "Camper niet omhoog — verplichte shuttle; hond aangelijnd in bagageruim", "maps": "https://www.google.com/maps/search/?api=1&query=Lagos%20de%20Covadonga"}, {"id": 16, "naam": "Arenas de Cabrales", "type": "overnachting", "lat": 43.297, "lng": -4.815, "dag": "vr 21 – za 22 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Korte hop 33 km / 0u40. Centraal massief. Cabrales-blauwkaas (kaasgrotten), markt.", "link": "", "caveat": "", "maps": "https://www.google.com/maps/search/?api=1&query=Arenas%20de%20Cabrales"}, {"id": 17, "naam": "Ruta del Cares (Poncebos)", "type": "wandeling", "lat": 43.265, "lng": -4.84, "dag": "vr 21 aug", "fase": "Met z'n tweeën", "hond": true, "info": "De klassieker: spectaculaire kloofwandeling. Hond verplicht kort aangelijnd (geen flexlijn) — steile afgronden zonder reling.", "link": "https://www.alltrails.com/trail/spain/asturias/pr-pnpe-3-ruta-del-cares--2", "caveat": "Hond kort aangelijnd; afgronden", "maps": "https://www.google.com/maps/search/?api=1&query=Ruta%20del%20Cares%20%28Poncebos%29"}, {"id": 18, "naam": "Funicular de Bulnes", "type": "kabelbaan", "lat": 43.246, "lng": -4.812, "dag": "za 22 aug", "fase": "Met z'n tweeën", "hond": true, "info": "Ondergrondse funicular naar het autoloze bergdorp Bulnes, met zicht op de Naranjo de Bulnes; daarna te voet terug naar Poncebos via de Canal del Texu (~1u15, pittig pad met afgronden). ~21,50 € retour.", "link": "https://blog.telecable.es/funicular-bulnes/", "caveat": "Hond in box óf muilkorf+lijn; afdaalpad met afgronden", "maps": "https://www.google.com/maps/search/?api=1&query=Funicular%20de%20Bulnes"}, {"id": 19, "naam": "Potes", "type": "overnachting", "lat": 43.155, "lng": -4.629, "dag": "zo 23 – ma 24 aug", "fase" const OVER="\n<p class=\"lead\">Een grote lus van ruim drie weken: met het hele gezin langs de Franse westkant omlaag naar een strandweek bij La Rochelle, daarna met z'n tweeën (en Max) een actieve rondreis door Noord-Spanje met de Picos de Europa als kloppend hart, en via de Pyreneeën direct terug naar huis. Andere wegen heen dan terug, korte ritten ter plekke, en overal de hond mee.</p>\n\n<h3>Heenreis — met de kinderen (6–10 aug)</h3>\n<p>In rustige etappes naar het zuidwesten: een avond in Châlons-en-Champagne, een glas wijn op een terras in Sancerre boven de Loire, en twee nachten ontspannen in het Marais Poitevin — het \"Groene Venetië\" met platbodems en vlakke fietspaden. Daarna inchecken op de vaste camping in Châtelaillon-Plage.</p>\n\n<h3>Strandweek — La Rochelle (10–16 aug)</h3>\n<p>Zeven dagen kust met het hele gezin. Strand op loopafstand (Max vroeg en laat), dagtripjes naar de oude haven van La Rochelle en het fietseiland Île de Ré. Even geen kilometers maken, gewoon zomer.</p>\n\n<h3>Baskenland — San Sebastián & Bilbao (17–18 aug)</h3>\n<p>Het tweede deel begint culinair: een avond pintxos hoppen door de oude stad van San Sebastián, en de dag erna Bilbao met zijn Casco Viejo, de Mercado de la Ribera en het Guggenheim van buiten. Mooi opwarmertje voor de bergen.</p>\n\n<h3>Het zwaartepunt — Picos de Europa (19–24 aug)</h3>\n<p>Zes nachten, dwars door de drie massieven van west naar oost. <b>Wat te doen:</b> met de shuttle omhoog naar de bergmeren van Covadonga; de spectaculaire kloofwandeling Ruta del Cares; het uitzicht op de Naranjo de Bulnes; dalwandelingen bij Fuente Dé; en de idyllische steendorpjes Mogrovejo en Liébana rond Potes, met de maandagmarkt en een glas orujo. Stevige wandelingen, koele bergnachten en authentieke dorpen — precies waar deze reis om draait.</p>\n\n<h3>Wijn, woestijn en kastelen — La Rioja & Navarra (25–27 aug)</h3>\n<p>Door het binnenland naar Laguardia, een ommuurd wijnstadje midden in de Rioja Alavesa — wijn op een terras tussen de wijngaarden. Daarna het verrassende woestijnlandschap van de Bardenas Reales (per camper of e-bike), en het middeleeuwse koningskasteel van Olite op weg naar het sprookjesachtige beukenwoud Selva de Irati.</p>\n\n<h3>De Pyreneeën — Ordesa (28–29 aug)</h3>\n<p>Via de kloof van Lumbier en het stadje Jaca naar Torla, poort van Nationaal Park Ordesa. Eén volle dag voor de grote tocht: met de shuttle het dal in en wandelen langs de watervallen tot de Cola de Caballo — het bergafscheid van de reis.</p>\n\n<h3>Terugreis — direct naar huis (30 aug–1 sep)</h3>\n<p>In drie reisdagen recht naar het noorden: via Brive-la-Gaillarde en Reims (champagne!) terug naar Doetinchem. Geen omweg, ander deel van Frankrijk dan de heenweg.</p>\n\n<h3>Goed om te weten</h3>\n<p><b>Hond Max:</b> overal mee, maar let op — stranden zijn 's zomers overdag vaak verboden (vroeg/laat uitlaten), de meren van Covadonga en het Ordesa-dal doe je met de verplichte shuttle (aangelijnd), en voor de kabelbaan Fuente Dé is een transportbox nodig — kies daar de dalwandeling. <b>Reserveren:</b> de gezinscamping staat; boek populaire camperplekken in het hoogseizoen vooruit of kom vóór de middag aan. <b>Hitte:</b> zoek bij warmte rivier- en meerwater op — fijner dan de zee, en hondvriendelijk.</p>\n";

  c.onclick=()=>{state[t]=!state[t]; c.classList.toggle('off',!state[t]); layers[t].forEach(m=> state[t]?m.addTo(map):map.removeLayer(m)); };
  fbox.appendChild(c);
});
const tl=document.getElementById('timeline'); let curPhase=null;
const tagColor={ "Met de kinderen":"#6366f1", "Met z'n tweeën":"#15803d" };
ITIN.forEach(d=>{
  if(d.phase!==curPhase){ curPhase=d.phase;
    const h=document.createElement('div'); h.className='phase-h';
    h.innerHTML='Fase<span class="tag" style="background:'+tagColor[d.phase]+'">'+d.phase+'</span>'; tl.appendChild(h); }
  const card=document.createElement('div'); card.className='card';
  card.style.borderLeftColor=KLEUR[d.tag]||'#94a3b8';
  const local=(d.drive==='lokaal'||d.drive==='—'||d.drive==='shuttle');
  let lis=d.items.map(it=>{const c=KLEUR[it[1]]||'#94a3b8';const paw=it[2]?' <span class="paw">🐾</span>':'';const note=it[3]?' <span class="note">— '+it[3]+'</span>':'';return '<li style="--c:'+c+'">'+it[0]+paw+note+'</li>';}).join('');
  card.innerHTML='<div class="top"><span class="date">'+d.date+'</span><span class="drive'+(local?' local':'')+'">'+d.drive+'</span></div><h3>'+d.title+'</h3><ul>'+lis+'</ul>';
  card.onclick=()=>{ const m=byId[d.mid]; if(m){ map.setView(m.getLatLng(),9,{animate:true}); m.openPopup(); } };
  tl.appendChild(card);
});
// POI's per categorie
const poibox=document.getElementById('poilist');
order.forEach(t=>{ if(!layers[t]) return;
  const items=MARKERS.filter(m=>m.type===t);
  const h=document.createElement('div'); h.className='phase-h';
  h.innerHTML='<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+KLEUR[t]+';margin-right:7px"></span>'+LABEL[t]+' <span style="color:#94a3b8;font-weight:500">('+items.length+')</span>';
  poibox.appendChild(h);
  items.forEach(sp=>{
    const card=document.createElement('div'); card.className='card'; card.style.borderLeftColor=KLEUR[t];
    let inner='<div class="top"><span class="date">'+(sp.dag||'')+'</span>'+(sp.hond?'<span class="paw">🐾</span>':'')+'</div><h3>'+sp.naam+'</h3><p class="why">'+(sp.info||'')+'</p>';
    if(sp.caveat) inner+='<p class="cv">⚠ '+sp.caveat+'</p>';
    if(sp.link) inner+='<a href="'+sp.link+'" target="_blank" rel="noopener">Meer info / boeken</a>';
    if(sp.maps) inner+=(sp.link?' · ':'')+'<a href="'+sp.maps+'" target="_blank" rel="noopener">📍 Google Maps</a>';
    card.innerHTML=inner;
    card.onclick=(e)=>{ if(e.target.tagName==='A')return; const m=byId[sp.id]; if(m){map.setView(m.getLatLng(),10,{animate:true}); m.openPopup();} };
    poibox.appendChild(card);
  });
});
document.getElementById('overblad').innerHTML=OVER;
const TABS=[['tab-plan','timeline'],['tab-poi','poilist'],['tab-over','overblad']];
function showTab(id){TABS.forEach(function(t){var bt=document.getElementById(t[0]),pe=document.getElementById(t[1]);var on=(t[0]===id);bt.classList.toggle('active',on);pe.style.display=on?'':'none';});}
TABS.forEach(function(t){document.getElementById(t[0]).onclick=function(){showTab(t[0]);};});
showTab('tab-plan');
document.getElementById('legend').innerHTML='Twee tabs: <b>Dagplanning</b> (etappes per dag) en <b>POI per categorie</b> (alle bestemmingen met de reden om er heen te gaan). 🐾 = hond Max welkom; let op de waarschuwingen in de popups (stranden zomer, shuttles, kabelbaan-box). Klik een item of marker om in te zoomen.';
</script>
